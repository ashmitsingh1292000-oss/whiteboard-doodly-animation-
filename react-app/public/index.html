<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0a0f1e" />
  <title>Whiteboard Animation</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0f1e; font-family: system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
    #root { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    /* Prevent iOS bounce scroll from breaking the fixed layout */
    html { height: 100%; overflow: hidden; }
    button { touch-action: manipulation; }

    @keyframes drawReveal {
      0%   { opacity: 0; transform: scale(0.85); }
      30%  { opacity: 1; }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes modalIn {
      0%   { opacity: 0; transform: scale(0.92) translateY(8px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes toastIn {
      0%   { opacity: 0; transform: translateX(-50%) translateY(16px); }
      100% { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }

    input[type=range]::-webkit-slider-runnable-track {
      background: #334155; height: 4px; border-radius: 2px;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px;
      border-radius: 50%; background: #3b82f6; margin-top: -5px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
